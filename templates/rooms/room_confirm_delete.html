{% extends "base.html" %}

{% block title %}Delete Room — Smart Gas Monitoring{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 border-danger">
            <div class="card-body p-4">
                <h1 class="h5 text-danger">Delete Room</h1>
                <p>Are you sure you want to delete <strong>{{ object.name }}</strong>? All gas readings and alerts for this room will also be deleted.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'rooms:list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
