<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; border: 1px solid #dc3545; border-radius: 8px; overflow: hidden;">
        <div style="background: #dc3545; color: white; padding: 20px;">
            <h1 style="margin: 0; font-size: 20px;">⚠ DANGER — Gas Alert</h1>
        </div>
        <div style="padding: 20px;">
            <table style="width: 100%; border-collapse: collapse;">
                <tr><td style="padding: 8px 0; font-weight: bold;">Room</td><td>{{ room_name }}</td></tr>
                <tr><td style="padding: 8px 0; font-weight: bold;">Gas Level</td><td style="color: #dc3545; font-weight: bold;">{{ gas_level }}</td></tr>
                <tr><td style="padding: 8px 0; font-weight: bold;">Status</td><td>{{ status }}</td></tr>
                <tr><td style="padding: 8px 0; font-weight: bold;">Timestamp</td><td>{{ timestamp|date:"Y-m-d H:i:s" }}</td></tr>
            </table>
            <p style="margin-top: 16px; padding: 12px; background: #fff3cd; border-radius: 4px;">{{ message }}</p>
            <p style="font-size: 12px; color: #666;">Automated alert from Smart Gas Monitoring System.</p>
        </div>
    </div>
</body>
</html>
